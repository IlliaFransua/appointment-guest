server:
  port: 8083
  forward-headers-strategy: framework

spring:
  application:
    name: guest

  mvc:
    problemdetails:
      enabled: true

  threads:
    virtual:
      enabled: true

  config:
    import: "optional:file:.env[.properties]"

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:5434}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

  data:
    redis:
      port: ${REDIS_PORT:6380}
      host: ${REDIS_HOST}
      password: ${REDIS_PASSWORD}

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        "[jdbc.batch_size]": 50
        "[order_inserts]": true
        "[order_updates]": true
        jdbc:
          "[time_zone]": UTC

  liquibase:
    change-log: classpath:db/changelog/db.changelog-guest.yaml
    enabled: true
    drop-first: false

services:
  master:
    url: http://localhost:8082

gatewayapieu:
  token: ${GATEWAYAPI_TOKEN}
  is-test-mode: true

internal:
  token: "${INTERNAL_TOKEN}"
